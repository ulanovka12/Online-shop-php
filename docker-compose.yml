services:
  web:
    image: nginx:stable
    container_name: nginx
    ports:
      - 81:80
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - php-fpm
      - postgresql

  php-fpm:
    container_name: php-fpm
    build: ../online-shop-2/docker/docker_php
    restart: always
    volumes:
      - .:/var/www/html
      - ./docker/docker_php/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-xdebug.ini
    depends_on:
      - postgresql

  postgresql:
    image: postgres:15.1
    restart: always
    container_name: postgres
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - 54322:5432